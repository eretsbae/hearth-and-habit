# 자동 글 생성 + 배포 파이프라인
# - 월/수/금 오전(북미 동부 기준)에 Claude로 새 글을 1개 생성하고
#   커밋한 뒤 사이트를 빌드해 GitHub Pages로 배포합니다.
# - Actions 탭에서 "Run workflow"로 수동 실행도 가능합니다.
#
# 필요 설정: 리포지토리 Settings → Secrets → Actions 에
#   ANTHROPIC_API_KEY 시크릿 등록

name: Generate & Publish Post

on:
  schedule:
    - cron: "17 13 * * 1,3,5" # Mon/Wed/Fri 13:17 UTC ≈ 9:17 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate new post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generator/generate_post.py

      - name: Commit generated content
        run: |
          git config user.name "hearth-habit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/ config/topics.yml
          git diff --cached --quiet || git commit -m "content: add scheduled post ($(date -u +%Y-%m-%d))"
          git push

      - name: Build site
        run: python generator/build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
