# 자동 글 생성 + Blogger 발행 파이프라인
# - 월/수/금 오전(북미 동부 기준)에 Claude로 새 글 1편(글 + SVG 일러스트)을
#   생성해 이 리포에 커밋/푸시한 뒤, Blogger API로 peterpb.blogspot.com에
#   자동 게시합니다.
# - Actions 탭에서 "Run workflow"로 수동 실행도 가능합니다.
#
# 필요한 리포지토리 시크릿 (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY     Claude API 키
#   GOOGLE_CLIENT_ID      generator/blogger_auth.py 실행 결과
#   GOOGLE_CLIENT_SECRET  generator/blogger_auth.py 실행 결과
#   GOOGLE_REFRESH_TOKEN  generator/blogger_auth.py 실행 결과

name: Generate & Publish Post

on:
  schedule:
    - cron: "17 13 * * 1,3,5" # Mon/Wed/Fri 13:17 UTC ≈ 9:17 AM ET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 인증이 죽어 있으면(만료된 refresh token 등) 글 생성에 Claude API 비용을
      # 쓰기 전에 여기서 즉시 실패시킨다.
      - name: Verify Blogger credentials
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python generator/blogger_publish.py --check-auth

      - name: Generate new post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generator/generate_post.py

      - name: Commit generated content
        run: |
          git config user.name "hearth-habit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/ config/topics.yml
          git diff --cached --quiet || git commit -m "content: add scheduled post ($(date -u +%Y-%m-%d))"
          git push

      - name: Publish to Blogger
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python generator/blogger_publish.py

      - name: Commit Blogger publish record
        run: |
          git add config/topics.yml
          git diff --cached --quiet || git commit -m "chore: record Blogger publish URLs"
          git push
