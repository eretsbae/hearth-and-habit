# 주간 트래픽 리포트 파이프라인
# - 매주 월요일 오전(한국 시간 기준 ~09:23)에 Blogger 조회수를 수집해
#   data/traffic_history.json에 누적하고, docs/reports/에 상세 리포트를
#   커밋한 뒤, 설정되어 있으면 카카오톡 "나에게 보내기"로 요약을 전송합니다.
# - 카카오톡 미설정 상태여도 실패하지 않습니다(이력 수집은 계속됨).
#   설정 방법: docs/KAKAO_REPORT.md
#
# 필요한 시크릿: GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / GOOGLE_REFRESH_TOKEN
# 선택(카카오톡): KAKAO_REST_API_KEY / KAKAO_TOKEN_PASSPHRASE

name: Weekly Traffic Report

on:
  schedule:
    - cron: "23 0 * * 1" # Mon 00:23 UTC = 월요일 09:23 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send weekly report
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_TOKEN_PASSPHRASE: ${{ secrets.KAKAO_TOKEN_PASSPHRASE }}
        run: python generator/weekly_report.py

      - name: Commit report and history
        run: |
          git config user.name "hearth-habit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/reports/ .secrets/ 2>/dev/null || git add data/ docs/reports/
          git diff --cached --quiet || git commit -m "report: weekly traffic snapshot ($(date -u +%Y-%m-%d))"
          git push
