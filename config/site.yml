# ─────────────────────────────────────────────────────────────
# Hearth & Habit — site configuration
# 사용자가 직접 수정해야 하는 값은 [사용자 입력] 표시가 되어 있습니다.
#
# 발행 플랫폼: Google Blogger (peterpb.blogspot.com)
# 도메인 구매나 GitHub Pages 배포 없이, 이미 존재하는 애드센스 연동
# Blogger 계정을 그대로 사용합니다. build_site.py / templates/ / static/
# 는 이제 CI 파이프라인에서 쓰이지 않고, 로컬 미리보기 용도로만 남아있습니다.
# ─────────────────────────────────────────────────────────────

site_name: "Hearth & Habit"
tagline: "Practical home care and everyday routines, made simple."

language: "en"
locale: "en_US"
author: "Hearth & Habit Editorial"
contact_email: "hello@hearthandhabit.example"  # [사용자 입력] 실제 이메일로 교체

# ── Blogger (실제 발행 대상) ────────────────────────────────
blogger:
  # [사용자 입력 완료] 이미 애드센스와 연동된 기존 Blogger 블로그
  blog_url: "https://peterpb.blogspot.com"
  # 비워두면 blog_url로 자동 조회(blogs.getByUrl)합니다. 알고 있다면 넣어도 됩니다.
  blog_id: ""

# ── 이미지 호스팅 (생성된 SVG를 raw.githubusercontent.com 로 서빙) ──
# Blogger 글 본문은 이 리포에 커밋된 이미지를 절대경로 URL로 참조합니다.
github:
  owner: "eretsbae"
  repo: "hearth-and-habit"
  branch: "main"

# ── (레거시/로컬 미리보기 전용 — 실제 배포에는 더 이상 사용되지 않음) ──
custom_domain: ""
fallback_url: "https://eretsbae.github.io/hearth-and-habit"
adsense:
  publisher_id: ""
  auto_ads: true
google_site_verification: ""

# ── Content generation ──────────────────────────────────────
generation:
  # Claude 모델 (글 생성용)
  model: "claude-sonnet-5"
  # 한 번 실행할 때 생성할 글 수
  posts_per_run: 1
  # 대기 중인 주제가 이 수 미만이면 필러 범위 안에서 새 주제를 자동 보충
  refill_threshold: 5
  refill_count: 10
  # 글 길이 가이드 (단어 수)
  target_words: 1400

  # ── 품질 게이트 (구글 "scaled content abuse" / 애드센스 콘텐츠 품질 심사 대응) ──
  # 발행 전 (1) 프로그래매틱 체크(글자수/구조/의심스러운 통계/금지 문구) +
  # (2) 별도 Claude 크리틱 채점을 통과해야 발행됩니다. 실패하면 1회 자동
  # 재작성 후 재검사하고, 그래도 실패하면 발행하지 않고 topics.yml에
  # status: needs_review 로 남겨(사람이 나중에 검토) 다음 대기 주제로 넘어갑니다.
  quality_gate:
    enabled: true
    min_words: 700
    min_score: 75
    max_revision_rounds: 1
    # 한 회차에서 게이트 탈락으로 건너뛸 수 있는 추가 주제 수
    # (posts_per_run + 이 값 만큼 시도한 뒤 포기)
    max_topic_attempts_extra: 3
