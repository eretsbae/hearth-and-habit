<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- soft background shape -->
  <ellipse cx="950" cy="120" rx="260" ry="180" fill="#E4C7B2" opacity="0.35"/>
  <ellipse cx="150" cy="530" rx="240" ry="160" fill="#5C6E58" opacity="0.12"/>

  <!-- notepad shadow -->
  <rect x="330" y="110" width="480" height="420" rx="14" fill="#2E2A24" opacity="0.08"/>

  <!-- notepad body -->
  <rect x="310" y="90" width="480" height="420" rx="14" fill="#F6EFE6" stroke="#2E2A24" stroke-width="3"/>

  <!-- spiral binding -->
  <g fill="none" stroke="#2E2A24" stroke-width="3">
    <circle cx="360" cy="90" r="10"/>
    <circle cx="420" cy="90" r="10"/>
    <circle cx="480" cy="90" r="10"/>
    <circle cx="540" cy="90" r="10"/>
    <circle cx="600" cy="90" r="10"/>
    <circle cx="660" cy="90" r="10"/>
    <circle cx="720" cy="90" r="10"/>
  </g>

  <!-- header bar -->
  <rect x="310" y="90" width="480" height="60" rx="14" fill="#B85C38"/>
  <rect x="310" y="130" width="480" height="20" fill="#B85C38"/>

  <!-- grid lines for weekly rows -->
  <g stroke="#D9A441" stroke-width="2" opacity="0.5">
    <line x1="330" y1="220" x2="770" y2="220"/>
    <line x1="330" y1="280" x2="770" y2="280"/>
    <line x1="330" y1="340" x2="770" y2="340"/>
    <line x1="330" y1="400" x2="770" y2="400"/>
    <line x1="330" y1="460" x2="770" y2="460"/>
  </g>

  <!-- day markers (simple dots instead of text) -->
  <g fill="#5C6E58">
    <circle cx="350" cy="195" r="6"/>
    <circle cx="350" cy="255" r="6"/>
    <circle cx="350" cy="315" r="6"/>
    <circle cx="350" cy="375" r="6"/>
    <circle cx="350" cy="435" r="6"/>
  </g>

  <!-- jotted "dinner name" scribble lines -->
  <g stroke="#2E2A24" stroke-width="4" stroke-linecap="round">
    <path d="M400 195 q40 -8 80 0 t80 0" fill="none"/>
    <path d="M400 255 q30 8 60 0 t60 0 t60 0" fill="none"/>
    <path d="M400 315 q50 -6 100 0" fill="none"/>
    <path d="M400 375 q35 6 70 0 t70 0" fill="none"/>
    <path d="M400 435 q45 -8 90 0 t60 0" fill="none"/>
  </g>

  <!-- small doodle icons next to each line for flavor -->
  <g fill="#B85C38">
    <circle cx="700" cy="195" r="8"/>
    <circle cx="680" cy="255" r="8"/>
    <circle cx="660" cy="315" r="8"/>
    <circle cx="690" cy="375" r="8"/>
    <circle cx="670" cy="435" r="8"/>
  </g>

  <!-- pencil resting diagonally on notepad -->
  <g transform="translate(600,470) rotate(-25)">
    <rect x="0" y="0" width="160" height="18" rx="4" fill="#D9A441"/>
    <polygon points="160,0 190,9 160,18" fill="#E4C7B2"/>
    <rect x="0" y="0" width="20" height="18" fill="#2E2A24"/>
    <rect x="20" y="6" width="140" height="4" fill="#F6EFE6" opacity="0.4"/>
  </g>

  <!-- stack of grocery receipts -->
  <g>
    <rect x="120" y="330" width="150" height="220" rx="6" fill="#E4C7B2" stroke="#2E2A24" stroke-width="2" transform="rotate(-6 195 440)"/>
    <rect x="140" y="310" width="150" height="220" rx="6" fill="#F6EFE6" stroke="#2E2A24" stroke-width="2" transform="rotate(4 215 420)"/>
    <rect x="130" y="300" width="150" height="220" rx="6" fill="#F6EFE6" stroke="#2E2A24" stroke-width="2" transform="rotate(-2 205 410)"/>

    <!-- receipt lines -->
    <g stroke="#5C6E58" stroke-width="3" stroke-linecap="round" transform="rotate(-2 205 410)">
      <line x1="150" y1="330" x2="260" y2="330"/>
      <line x1="150" y1="350" x2="240" y2="350"/>
      <line x1="150" y1="370" x2="255" y2="370"/>
      <line x1="150" y1="390" x2="230" y2="390"/>
      <line x1="150" y1="410" x2="250" y2="410"/>
      <line x1="150" y1="430" x2="220" y2="430"/>
      <line x1="150" y1="450" x2="245" y2="450"/>
    </g>

    <!-- receipt total marker -->
    <rect x="150" y="470" width="90" height="10" fill="#B85C38" transform="rotate(-2 205 410)"/>
  </g>

  <!-- small terracotta accent circle top left -->
  <circle cx="140" cy="120" r="40" fill="#B85C38" opacity="0.85"/>
  <circle cx="200" cy="90" r="18" fill="#D9A441"/>

  <!-- sage leaf accent bottom right -->
  <path d="M1040 560 q40 -60 100 -40 q-20 60 -100 40 z" fill="#5C6E58"/>
  <path d="M1090 520 q10 -30 40 -20" stroke="#5C6E58" stroke-width="4" fill="none"/>
</svg>