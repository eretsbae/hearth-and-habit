<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- Window background -->
  <rect x="0" y="0" width="1200" height="330" fill="#E4C7B2" opacity="0.35"/>
  <rect x="90" y="40" width="1020" height="250" fill="#F6EFE6" stroke="#5C6E58" stroke-width="8"/>
  <rect x="90" y="40" width="500" height="250" fill="#E4C7B2" opacity="0.5"/>
  <rect x="600" y="40" width="510" height="250" fill="#E4C7B2" opacity="0.3"/>
  <line x1="600" y1="40" x2="600" y2="290" stroke="#5C6E58" stroke-width="8"/>
  <line x1="90" y1="165" x2="1110" y2="165" stroke="#5C6E58" stroke-width="8"/>

  <!-- soft outdoor shapes seen through window -->
  <circle cx="950" cy="110" r="35" fill="#D9A441" opacity="0.5"/>
  <ellipse cx="250" cy="230" rx="60" ry="25" fill="#5C6E58" opacity="0.4"/>
  <ellipse cx="750" cy="230" rx="80" ry="30" fill="#5C6E58" opacity="0.4"/>

  <!-- Windowsill -->
  <rect x="40" y="330" width="1120" height="40" fill="#B85C38"/>
  <rect x="40" y="370" width="1120" height="14" fill="#2E2A24" opacity="0.15"/>

  <!-- Painter's tape roll -->
  <g transform="translate(200,470)">
    <ellipse cx="0" cy="0" rx="90" ry="70" fill="#D9A441"/>
    <ellipse cx="0" cy="0" rx="38" ry="30" fill="#F6EFE6"/>
    <path d="M -90 0 A 90 70 0 0 1 90 0" fill="none" stroke="#2E2A24" stroke-width="3" opacity="0.2"/>
  </g>

  <!-- Putty knife -->
  <g transform="translate(430,500) rotate(-8)">
    <rect x="-14" y="-140" width="28" height="100" rx="10" fill="#5C6E58"/>
    <rect x="-6" y="-150" width="12" height="20" fill="#2E2A24"/>
    <path d="M -40 -40 L 40 -40 L 30 20 L -30 20 Z" fill="#B85C38"/>
    <path d="M -30 20 L 30 20 L 26 34 L -26 34 Z" fill="#2E2A24" opacity="0.3"/>
  </g>

  <!-- Caulk tube -->
  <g transform="translate(620,470)">
    <rect x="-30" y="-10" width="60" height="120" rx="6" fill="#E4C7B2"/>
    <rect x="-30" y="-10" width="60" height="30" fill="#B85C38"/>
    <path d="M -18 -10 L 18 -10 L 10 -45 L -10 -45 Z" fill="#5C6E58"/>
    <rect x="-6" y="-65" width="12" height="22" fill="#2E2A24"/>
    <circle cx="0" cy="50" r="20" fill="#F6EFE6" opacity="0.6"/>
  </g>

  <!-- Caulking gun -->
  <g transform="translate(880,430)">
    <!-- frame rod -->
    <rect x="-160" y="10" width="230" height="10" rx="5" fill="#5C6E58"/>
    <!-- barrel cradle -->
    <path d="M -160 -10 L -160 30 L -140 30 L -140 -10 Z" fill="#5C6E58"/>
    <path d="M 60 -10 L 60 30 L 80 30 L 80 -10 Z" fill="#5C6E58"/>
    <!-- tube inside -->
    <rect x="-150" y="-2" width="220" height="24" rx="12" fill="#D9A441"/>
    <!-- plunger rod -->
    <rect x="70" y="0" width="90" height="8" fill="#2E2A24"/>
    <rect x="150" y="-8" width="18" height="24" rx="4" fill="#2E2A24"/>
    <!-- handle -->
    <path d="M -160 20 L -190 100 L -160 100 L -140 40 Z" fill="#B85C38"/>
    <!-- trigger -->
    <path d="M -140 40 L -120 40 L -128 90 L -142 90 Z" fill="#B85C38"/>
    <!-- nozzle -->
    <path d="M 80 -6 L 130 -2 L 130 14 L 80 18 Z" fill="#2E2A24"/>
  </g>

  <!-- small drips / dots for detail -->
  <circle cx="150" cy="420" r="6" fill="#B85C38" opacity="0.5"/>
  <circle cx="1050" cy="440" r="8" fill="#5C6E58" opacity="0.4"/>
  <circle cx="700" cy="600" r="10" fill="#D9A441" opacity="0.3"/>
</svg>