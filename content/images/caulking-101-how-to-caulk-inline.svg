<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- Decorative background circles -->
  <circle cx="1080" cy="90" r="60" fill="#E4C7B2" opacity="0.5"/>
  <circle cx="100" cy="540" r="80" fill="#D9A441" opacity="0.25"/>
  <circle cx="1120" cy="560" r="40" fill="#5C6E58" opacity="0.3"/>

  <!-- Wall tile section -->
  <rect x="0" y="0" width="1200" height="260" fill="#E4C7B2"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#2E2A24" stroke-width="2" opacity="0.15"/>
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#2E2A24" stroke-width="2" opacity="0.15"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#2E2A24" stroke-width="2" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="260" stroke="#2E2A24" stroke-width="2" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="260" stroke="#2E2A24" stroke-width="2" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="260" stroke="#2E2A24" stroke-width="2" opacity="0.1"/>
  <line x1="800" y1="0" x2="800" y2="260" stroke="#2E2A24" stroke-width="2" opacity="0.1"/>
  <line x1="1000" y1="0" x2="1000" y2="260" stroke="#2E2A24" stroke-width="2" opacity="0.1"/>

  <!-- Bathtub edge cross-section -->
  <path d="M 0 260 L 0 630 L 1200 630 L 1200 260 L 900 260 Q 850 260 850 310 L 850 380 Q 850 420 810 420 L 0 420 Z" fill="#F6EFE6"/>
  
  <!-- Tub rim highlight -->
  <path d="M 850 260 Q 850 260 850 310 L 850 380 Q 850 420 810 420" fill="none" stroke="#2E2A24" stroke-width="3" opacity="0.2"/>

  <!-- Tub outer wall shading -->
  <rect x="0" y="420" width="1200" height="210" fill="#F0E6D8"/>
  <path d="M 0 420 L 810 420 Q 850 420 850 380" fill="none" stroke="#2E2A24" stroke-width="2" opacity="0.15"/>

  <!-- Caulk line seam -->
  <path d="M 200 245 Q 500 235 850 260" fill="none" stroke="#2E2A24" stroke-width="1" opacity="0.1"/>
  
  <!-- Main caulk bead -->
  <path d="M 0 258 Q 300 244 600 250 Q 750 253 900 258 L 900 278 Q 750 273 600 270 Q 300 264 0 278 Z" fill="#F6EFE6" stroke="#D9A441" stroke-width="0" />
  
  <!-- Smooth caulk bead shape -->
  <path d="M 0 250 Q 200 238 450 244 Q 650 248 900 256 Q 940 258 960 270 Q 940 282 900 284 Q 650 278 450 272 Q 200 266 0 278 Z" fill="#F6EFE6"/>
  <path d="M 0 250 Q 200 238 450 244 Q 650 248 900 256 Q 940 258 960 270 Q 940 282 900 284 Q 650 278 450 272 Q 200 266 0 278 Z" fill="none" stroke="#2E2A24" stroke-width="1.5" opacity="0.15"/>

  <!-- Caulk line highlight -->
  <path d="M 20 254 Q 250 244 480 248 Q 680 251 880 260" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>

  <!-- Tub water surface hint -->
  <ellipse cx="600" cy="450" rx="560" ry="18" fill="#5C6E58" opacity="0.12"/>

  <!-- Sponge decorative element -->
  <g transform="translate(980, 500)">
    <rect x="-60" y="-30" width="120" height="70" rx="18" fill="#D9A441" opacity="0.85"/>
    <circle cx="-30" cy="-5" r="6" fill="#F6EFE6" opacity="0.5"/>
    <circle cx="10" cy="10" r="8" fill="#F6EFE6" opacity="0.5"/>
    <circle cx="35" cy="-10" r="5" fill="#F6EFE6" opacity="0.5"/>
    <circle cx="-10" cy="25" r="5" fill="#F6EFE6" opacity="0.5"/>
  </g>

  <!-- Caulk gun nozzle detail -->
  <g transform="translate(150, 470)">
    <rect x="-15" y="-70" width="30" height="90" rx="6" fill="#B85C38"/>
    <path d="M -15 20 L 15 20 L 8 55 L -8 55 Z" fill="#5C6E58"/>
    <circle cx="0" cy="-85" r="12" fill="#2E2A24" opacity="0.8"/>
  </g>

  <!-- Small droplet accents near caulk line for texture -->
  <circle cx="320" cy="256" r="3" fill="#D9A441" opacity="0.4"/>
  <circle cx="540" cy="262" r="2.5" fill="#B85C38" opacity="0.3"/>
  <circle cx="700" cy="266" r="3" fill="#5C6E58" opacity="0.3"/>

  <!-- Bottom grout line -->
  <rect x="0" y="418" width="1200" height="4" fill="#2E2A24" opacity="0.1"/>
</svg>