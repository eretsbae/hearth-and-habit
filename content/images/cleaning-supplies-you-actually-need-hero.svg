<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- background decorative shapes -->
  <circle cx="1080" cy="120" r="140" fill="#E4C7B2" opacity="0.4"/>
  <circle cx="90" cy="520" r="180" fill="#5C6E58" opacity="0.12"/>
  <rect x="0" y="470" width="1200" height="160" fill="#E4C7B2" opacity="0.3"/>

  <!-- shelf/surface line -->
  <rect x="100" y="470" width="1000" height="14" fill="#2E2A24" opacity="0.15"/>

  <!-- Caddy -->
  <g>
    <rect x="330" y="400" width="540" height="90" rx="14" fill="#B85C38"/>
    <rect x="330" y="400" width="540" height="20" rx="8" fill="#a24f30"/>
    <path d="M560 340 Q600 260 640 340" stroke="#B85C38" stroke-width="22" fill="none" stroke-linecap="round"/>
    <rect x="320" y="480" width="20" height="30" rx="6" fill="#8f4930"/>
    <rect x="860" y="480" width="20" height="30" rx="6" fill="#8f4930"/>
  </g>

  <!-- Bottle 1: tall terracotta bottle -->
  <g>
    <rect x="365" y="270" width="70" height="150" rx="10" fill="#B85C38"/>
    <rect x="380" y="240" width="40" height="35" rx="6" fill="#8f4930"/>
    <rect x="390" y="220" width="20" height="25" rx="4" fill="#5C6E58"/>
    <rect x="375" y="310" width="50" height="60" rx="6" fill="#F6EFE6" opacity="0.85"/>
    <rect x="382" y="325" width="36" height="8" rx="3" fill="#5C6E58"/>
    <rect x="382" y="340" width="30" height="6" rx="3" fill="#D9A441"/>
  </g>

  <!-- Bottle 2: sage bottle -->
  <g>
    <rect x="450" y="290" width="65" height="130" rx="10" fill="#5C6E58"/>
    <rect x="465" y="265" width="35" height="30" rx="6" fill="#455242"/>
    <rect x="474" y="248" width="18" height="22" rx="4" fill="#D9A441"/>
    <rect x="458" y="325" width="48" height="55" rx="6" fill="#F6EFE6" opacity="0.85"/>
    <rect x="466" y="338" width="32" height="7" rx="3" fill="#B85C38"/>
  </g>

  <!-- Spray bottle -->
  <g>
    <rect x="535" y="300" width="80" height="120" rx="12" fill="#D9A441"/>
    <rect x="555" y="270" width="40" height="35" rx="6" fill="#c69432"/>
    <path d="M595 275 L640 260 L640 250 L600 262 Z" fill="#2E2A24"/>
    <rect x="600" y="245" width="16" height="14" rx="3" fill="#2E2A24"/>
    <rect x="547" y="335" width="56" height="60" rx="6" fill="#F6EFE6" opacity="0.9"/>
    <rect x="557" y="350" width="36" height="8" rx="3" fill="#5C6E58"/>
    <rect x="557" y="365" width="28" height="6" rx="3" fill="#B85C38"/>
  </g>

  <!-- Small clay jar -->
  <g>
    <rect x="635" y="330" width="60" height="90" rx="10" fill="#E4C7B2"/>
    <rect x="640" y="315" width="50" height="20" rx="6" fill="#d4b29a"/>
    <circle cx="665" cy="325" r="6" fill="#B85C38"/>
  </g>

  <!-- Scrub brush -->
  <g>
    <rect x="720" y="360" width="80" height="35" rx="10" fill="#2E2A24"/>
    <rect x="725" y="345" width="70" height="20" rx="8" fill="#5C6E58"/>
    <g stroke="#D9A441" stroke-width="5" stroke-linecap="round">
      <line x1="735" y1="345" x2="735" y2="325"/>
      <line x1="750" y1="345" x2="750" y2="320"/>
      <line x1="765" y1="345" x2="765" y2="322"/>
      <line x1="780" y1="345" x2="780" y2="326"/>
    </g>
    <rect x="740" y="395" width="45" height="18" rx="6" fill="#8f4930"/>
  </g>

  <!-- Microfiber cloths, folded stack -->
  <g>
    <rect x="810" y="380" width="120" height="20" rx="6" fill="#5C6E58"/>
    <rect x="815" y="360" width="110" height="20" rx="6" fill="#D9A441"/>
    <rect x="820" y="340" width="100" height="20" rx="6" fill="#B85C38"/>
  </g>

  <!-- extra small cloth draped on caddy handle -->
  <path d="M600 320 Q615 350 590 375 Q580 380 585 360 Q590 335 600 320 Z" fill="#E4C7B2"/>

  <!-- little dust sparkle accents -->
  <g fill="#D9A441" opacity="0.7">
    <circle cx="300" cy="200" r="5"/>
    <circle cx="950" cy="180" r="4"/>
    <circle cx="270" cy="260" r="3"/>
  </g>

  <!-- decorative leaf sprig -->
  <g fill="#5C6E58" opacity="0.85">
    <ellipse cx="950" cy="380" rx="14" ry="30" transform="rotate(30 950 380)"/>
    <ellipse cx="970" cy="400" rx="12" ry="26" transform="rotate(50 970 400)"/>
    <ellipse cx="930" cy="405" rx="12" ry="26" transform="rotate(-10 930 405)"/>
  </g>
</svg>