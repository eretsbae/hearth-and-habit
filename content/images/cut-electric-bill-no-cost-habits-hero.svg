<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F6EFE6"/>
  <circle cx="1000" cy="130" r="200" fill="#EFE3D2"/>
  <circle cx="150" cy="520" r="170" fill="#EFE3D2"/>
  <!-- house silhouette -->
  <path d="M330 330 L600 130 L870 330 L870 560 L330 560 Z" fill="#FDFAF5" stroke="#2E2A24" stroke-width="10"/>
  <path d="M300 345 L600 118 L900 345" fill="none" stroke="#B85C38" stroke-width="18" stroke-linecap="round"/>
  <!-- door -->
  <rect x="560" y="430" width="80" height="130" rx="8" fill="#5C6E58"/>
  <circle cx="628" cy="500" r="7" fill="#D9A441"/>
  <!-- windows: one lit, one dark (lights off) -->
  <rect x="400" y="380" width="100" height="90" rx="8" fill="#D9A441"/>
  <rect x="700" y="380" width="100" height="90" rx="8" fill="#3B352E"/>
  <line x1="450" y1="380" x2="450" y2="470" stroke="#F6EFE6" stroke-width="6"/>
  <line x1="400" y1="425" x2="500" y2="425" stroke="#F6EFE6" stroke-width="6"/>
  <line x1="750" y1="380" x2="750" y2="470" stroke="#2E2A24" stroke-width="6"/>
  <line x1="700" y1="425" x2="800" y2="425" stroke="#2E2A24" stroke-width="6"/>
  <!-- bolt badge -->
  <circle cx="600" cy="300" r="64" fill="#B85C38"/>
  <path d="M615 252 L570 312 L598 312 L585 348 L632 288 L604 288 Z" fill="#F6EFE6"/>
  <!-- coins falling -->
  <g stroke="#2E2A24" stroke-width="5">
    <circle cx="985" cy="330" r="26" fill="#D9A441"/>
    <circle cx="1040" cy="410" r="22" fill="#D9A441"/>
    <circle cx="975" cy="480" r="18" fill="#D9A441"/>
  </g>
  <!-- downward trend line -->
  <path d="M120 180 L230 240 L200 236 M230 240 L226 208" fill="none" stroke="#5C6E58" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- sun -->
  <circle cx="170" cy="110" r="42" fill="#D9A441"/>
  <g stroke="#D9A441" stroke-width="10" stroke-linecap="round">
    <line x1="170" y1="35" x2="170" y2="55"/>
    <line x1="170" y1="165" x2="170" y2="185"/>
    <line x1="95" y1="110" x2="115" y2="110"/>
    <line x1="225" y1="110" x2="245" y2="110"/>
  </g>
</svg>
