<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- soft background shape -->
  <circle cx="950" cy="120" r="180" fill="#E4C7B2" opacity="0.35"/>
  <circle cx="120" cy="520" r="140" fill="#5C6E58" opacity="0.12"/>

  <!-- drawer body / cabinet front -->
  <rect x="330" y="230" width="540" height="260" rx="10" fill="#E4C7B2"/>
  <rect x="330" y="230" width="540" height="260" rx="10" fill="none" stroke="#2E2A24" stroke-width="2" opacity="0.15"/>

  <!-- open drawer box (perspective trapezoid) -->
  <polygon points="360,300 840,300 800,480 400,480" fill="#F6EFE6"/>
  <polygon points="360,300 840,300 800,480 400,480" fill="none" stroke="#2E2A24" stroke-width="2" opacity="0.2"/>

  <!-- inner drawer side walls for depth -->
  <polygon points="360,300 400,480 400,470 365,300" fill="#D9A441" opacity="0.25"/>
  <polygon points="840,300 800,480 800,470 835,300" fill="#D9A441" opacity="0.25"/>

  <!-- drawer front panel below opening -->
  <rect x="330" y="420" width="540" height="70" fill="#B85C38"/>
  <rect x="560" y="445" width="80" height="14" rx="7" fill="#5C6E58"/>

  <!-- Neatly organized items inside drawer (left side) -->
  <!-- folded cloth -->
  <rect x="420" y="360" width="90" height="55" rx="6" fill="#5C6E58"/>
  <rect x="420" y="375" width="90" height="6" fill="#F6EFE6" opacity="0.4"/>
  <rect x="420" y="390" width="90" height="6" fill="#F6EFE6" opacity="0.4"/>

  <!-- small organizer tray with pens -->
  <rect x="530" y="380" width="110" height="45" rx="4" fill="#D9A441"/>
  <rect x="540" y="345" width="8" height="45" rx="3" fill="#2E2A24"/>
  <rect x="558" y="350" width="8" height="40" rx="3" fill="#B85C38"/>
  <rect x="576" y="355" width="8" height="35" rx="3" fill="#5C6E58"/>

  <!-- neat stack of small boxes -->
  <rect x="655" y="390" width="60" height="30" rx="4" fill="#B85C38"/>
  <rect x="662" y="365" width="46" height="26" rx="4" fill="#5C6E58"/>

  <!-- Pile of miscellaneous objects (right side, outside drawer on tabletop) -->
  <rect x="0" y="490" width="1200" height="140" fill="#E4C7B2" opacity="0.5"/>

  <!-- scattered pile -->
  <g>
    <ellipse cx="950" cy="560" rx="150" ry="18" fill="#2E2A24" opacity="0.06"/>

    <!-- tangled cord -->
    <path d="M870 545 C900 520 930 570 960 540 C980 520 1000 555 1015 535" stroke="#2E2A24" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round"/>

    <!-- crumpled paper ball -->
    <circle cx="900" cy="555" r="22" fill="#F6EFE6"/>
    <path d="M885 545 q15 -10 25 0 q10 10 -5 20 q-15 8 -20 -20" fill="none" stroke="#2E2A24" stroke-width="1.5" opacity="0.3"/>

    <!-- small key -->
    <circle cx="960" cy="580" r="9" fill="none" stroke="#D9A441" stroke-width="4"/>
    <rect x="967" y="577" width="20" height="5" fill="#D9A441"/>
    <rect x="982" y="577" width="4" height="10" fill="#D9A441"/>

    <!-- odd button -->
    <circle cx="1010" cy="565" r="12" fill="#B85C38"/>
    <circle cx="1006" cy="561" r="1.5" fill="#2E2A24"/>
    <circle cx="1014" cy="561" r="1.5" fill="#2E2A24"/>
    <circle cx="1006" cy="569" r="1.5" fill="#2E2A24"/>
    <circle cx="1014" cy="569" r="1.5" fill="#2E2A24"/>

    <!-- rubber band ball -->
    <circle cx="1045" cy="545" r="16" fill="#D9A441"/>
    <path d="M1030 545 a16 8 0 0 1 30 0" fill="none" stroke="#B85C38" stroke-width="2" opacity="0.6"/>
    <path d="M1030 545 a16 8 0 0 0 30 0" fill="none" stroke="#B85C38" stroke-width="2" opacity="0.6"/>

    <!-- small screwdriver -->
    <rect x="855" y="580" width="60" height="8" rx="4" fill="#5C6E58" transform="rotate(-15 855 580)"/>
    <rect x="845" y="578" width="18" height="10" rx="3" fill="#2E2A24" transform="rotate(-15 845 578)"/>

    <!-- coin/token -->
    <circle cx="905" cy="595" r="10" fill="#D9A441"/>
    <circle cx="905" cy="595" r="6" fill="none" stroke="#B85C38" stroke-width="1.5"/>

    <!-- small mismatched sock -->
    <path d="M1080 575 q-5 -25 15 -28 q20 -3 22 15 q2 15 -12 20 q-15 5 -25 -7 Z" fill="#B85C38" opacity="0.85"/>
  </g>

  <!-- soft shadow under drawer unit -->
  <ellipse cx="600" cy="500" rx="290" ry="14" fill="#2E2A24" opacity="0.08"/>
</svg>