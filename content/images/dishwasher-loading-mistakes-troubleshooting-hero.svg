<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- Outer rack frame -->
  <rect x="120" y="65" width="960" height="500" rx="18" fill="#E4C7B2"/>
  <rect x="150" y="95" width="900" height="440" rx="14" fill="#F6EFE6"/>

  <!-- Spray arm below, visible through rack -->
  <g opacity="0.5">
    <circle cx="600" cy="315" r="150" fill="none" stroke="#5C6E58" stroke-width="10"/>
    <line x1="600" y1="165" x2="600" y2="465" stroke="#5C6E58" stroke-width="10"/>
    <line x1="450" y1="315" x2="750" y2="315" stroke="#5C6E58" stroke-width="10"/>
    <circle cx="600" cy="315" r="22" fill="#5C6E58"/>
    <circle cx="600" cy="200" r="7" fill="#5C6E58"/>
    <circle cx="600" cy="430" r="7" fill="#5C6E58"/>
    <circle cx="485" cy="315" r="7" fill="#5C6E58"/>
    <circle cx="715" cy="315" r="7" fill="#5C6E58"/>
  </g>

  <!-- Rack grid lines -->
  <g stroke="#D9A441" stroke-width="3" opacity="0.35">
    <line x1="150" y1="160" x2="1050" y2="160"/>
    <line x1="150" y1="230" x2="1050" y2="230"/>
    <line x1="150" y1="400" x2="1050" y2="400"/>
    <line x1="150" y1="470" x2="1050" y2="470"/>
    <line x1="260" y1="95" x2="260" y2="535"/>
    <line x1="390" y1="95" x2="390" y2="535"/>
    <line x1="520" y1="95" x2="520" y2="535"/>
    <line x1="680" y1="95" x2="680" y2="535"/>
    <line x1="810" y1="95" x2="810" y2="535"/>
    <line x1="940" y1="95" x2="940" y2="535"/>
  </g>

  <!-- Plates, top-left cluster -->
  <g>
    <circle cx="255" cy="165" r="55" fill="#B85C38"/>
    <circle cx="255" cy="165" r="38" fill="#F6EFE6"/>
    <circle cx="255" cy="165" r="16" fill="#E4C7B2"/>
  </g>
  <g>
    <circle cx="255" cy="290" r="55" fill="#5C6E58"/>
    <circle cx="255" cy="290" r="38" fill="#F6EFE6"/>
    <circle cx="255" cy="290" r="16" fill="#E4C7B2"/>
  </g>
  <g>
    <circle cx="255" cy="500" r="55" fill="#D9A441"/>
    <circle cx="255" cy="500" r="38" fill="#F6EFE6"/>
    <circle cx="255" cy="500" r="16" fill="#E4C7B2"/>
  </g>

  <!-- Plates bottom right cluster, slightly overlapped -->
  <g>
    <circle cx="965" cy="165" r="55" fill="#5C6E58"/>
    <circle cx="965" cy="165" r="38" fill="#F6EFE6"/>
    <circle cx="965" cy="165" r="16" fill="#E4C7B2"/>
  </g>
  <g>
    <circle cx="940" cy="290" r="50" fill="#B85C38"/>
    <circle cx="940" cy="290" r="34" fill="#F6EFE6"/>
    <circle cx="940" cy="290" r="14" fill="#E4C7B2"/>
  </g>
  <g>
    <circle cx="965" cy="500" r="55" fill="#D9A441"/>
    <circle cx="965" cy="500" r="38" fill="#F6EFE6"/>
    <circle cx="965" cy="500" r="16" fill="#E4C7B2"/>
  </g>

  <!-- Glasses row, top -->
  <g>
    <circle cx="390" cy="125" r="26" fill="#5C6E58" opacity="0.85"/>
    <circle cx="390" cy="125" r="15" fill="#F6EFE6"/>
  </g>
  <g>
    <circle cx="450" cy="125" r="26" fill="#5C6E58" opacity="0.85"/>
    <circle cx="450" cy="125" r="15" fill="#F6EFE6"/>
  </g>
  <g>
    <circle cx="750" cy="125" r="26" fill="#B85C38" opacity="0.85"/>
    <circle cx="750" cy="125" r="15" fill="#F6EFE6"/>
  </g>
  <g>
    <circle cx="810" cy="125" r="26" fill="#B85C38" opacity="0.85"/>
    <circle cx="810" cy="125" r="15" fill="#F6EFE6"/>
  </g>

  <!-- Bowls, bottom row -->
  <g>
    <circle cx="390" cy="500" r="42" fill="#D9A441"/>
    <circle cx="390" cy="500" r="28" fill="#F6EFE6"/>
  </g>
  <g>
    <circle cx="480" cy="500" r="42" fill="#B85C38"/>
    <circle cx="480" cy="500" r="28" fill="#F6EFE6"/>
  </g>
  <g>
    <circle cx="720" cy="500" r="42" fill="#5C6E58"/>
    <circle cx="720" cy="500" r="28" fill="#F6EFE6"/>
  </g>
  <g>
    <circle cx="810" cy="500" r="42" fill="#D9A441"/>
    <circle cx="810" cy="500" r="28" fill="#F6EFE6"/>
  </g>

  <!-- Utensil basket, center -->
  <rect x="530" y="180" width="140" height="200" rx="10" fill="#B85C38" opacity="0.85"/>
  <g stroke="#2E2A24" stroke-width="3" opacity="0.4">
    <line x1="545" y1="180" x2="545" y2="380"/>
    <line x1="570" y1="180" x2="570" y2="380"/>
    <line x1="595" y1="180" x2="595" y2="380"/>
    <line x1="620" y1="180" x2="620" y2="380"/>
    <line x1="645" y1="180" x2="645" y2="380"/>
  </g>

  <!-- Forks -->
  <g fill="#F6EFE6">
    <rect x="548" y="195" width="8" height="70" rx="3"/>
    <rect x="545" y="195" width="3" height="20"/>
    <rect x="552" y="195" width="3" height="20"/>
    <rect x="559" y="195" width="3" height="20"/>
  </g>
  <!-- Spoons -->
  <g fill="#F6EFE6">
    <ellipse cx="600" cy="205" rx="9" ry="14"/>
    <rect x="596" y="215" width="8" height="55" rx="3"/>
  </g>
  <!-- Knife -->
  <g fill="#F6EFE6">
    <rect x="638" y="200" width="10" height="65" rx="3"/>
    <polygon points="638,200 648,200 648,230 643,235 638,230"/>
  </g>

  <!-- small decorative steam/water drops near spray arm center -->
  <g fill="#D9A441" opacity="0.5">
    <circle cx="600" cy="315" r="6"/>
    <circle cx="580" cy="330" r="4"/>
    <circle cx="620" cy="330" r="4"/>
  </g>
</svg>