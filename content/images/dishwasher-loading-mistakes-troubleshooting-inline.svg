<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- Divider -->
  <line x1="600" y1="70" x2="600" y2="560" stroke="#E4C7B2" stroke-width="3" stroke-dasharray="10 10"/>

  <!-- Left panel: bad loading -->
  <g>
    <rect x="90" y="90" width="440" height="440" rx="18" fill="#E4C7B2" opacity="0.35"/>
    <!-- rack frame -->
    <rect x="120" y="380" width="380" height="18" rx="6" fill="#5C6E58"/>
    <rect x="120" y="380" width="16" height="120" fill="#5C6E58"/>
    <rect x="484" y="380" width="16" height="120" fill="#5C6E58"/>
    <line x1="140" y1="398" x2="480" y2="398" stroke="#5C6E58" stroke-width="4"/>
    <line x1="140" y1="398" x2="150" y2="440" stroke="#5C6E58" stroke-width="4"/>
    <line x1="200" y1="398" x2="210" y2="440" stroke="#5C6E58" stroke-width="4"/>
    <line x1="260" y1="398" x2="270" y2="440" stroke="#5C6E58" stroke-width="4"/>
    <line x1="320" y1="398" x2="330" y2="440" stroke="#5C6E58" stroke-width="4"/>
    <line x1="380" y1="398" x2="390" y2="440" stroke="#5C6E58" stroke-width="4"/>
    <line x1="440" y1="398" x2="450" y2="440" stroke="#5C6E58" stroke-width="4"/>

    <!-- nested bowls, overlapping and chaotic -->
    <ellipse cx="200" cy="330" rx="70" ry="30" fill="#B85C38"/>
    <ellipse cx="200" cy="322" rx="55" ry="22" fill="#F6EFE6"/>
    <ellipse cx="240" cy="345" rx="60" ry="26" fill="#D9A441" opacity="0.9"/>
    <ellipse cx="240" cy="338" rx="46" ry="18" fill="#F6EFE6"/>

    <!-- overlapping cups tipped and crowded -->
    <g transform="rotate(15 330 340)">
      <path d="M310 300 L350 300 L345 360 L315 360 Z" fill="#B85C38"/>
      <ellipse cx="330" cy="300" rx="20" ry="7" fill="#E4C7B2"/>
    </g>
    <g transform="rotate(-10 365 330)">
      <path d="M348 295 L388 295 L383 355 L353 355 Z" fill="#5C6E58"/>
      <ellipse cx="368" cy="295" rx="20" ry="7" fill="#E4C7B2"/>
    </g>
    <g transform="rotate(25 410 345)">
      <path d="M392 305 L432 305 L427 365 L397 365 Z" fill="#D9A441"/>
      <ellipse cx="412" cy="305" rx="20" ry="7" fill="#E4C7B2"/>
    </g>

    <!-- big plate crammed vertical, blocking spray -->
    <rect x="150" y="150" width="14" height="180" rx="6" fill="#2E2A24" opacity="0.65"/>
    <rect x="175" y="140" width="14" height="190" rx="6" fill="#2E2A24" opacity="0.5"/>
    <ellipse cx="300" cy="230" rx="130" ry="14" fill="#B85C38" opacity="0.5"/>

    <!-- frustration marks -->
    <g stroke="#2E2A24" stroke-width="5" stroke-linecap="round">
      <line x1="470" y1="130" x2="490" y2="150"/>
      <line x1="490" y1="130" x2="470" y2="150"/>
      <line x1="470" y1="160" x2="490" y2="180"/>
      <line x1="490" y1="160" x2="470" y2="180"/>
    </g>
  </g>

  <!-- Right panel: good loading -->
  <g>
    <rect x="670" y="90" width="440" height="440" rx="18" fill="#5C6E58" opacity="0.12"/>
    <!-- rack frame -->
    <rect x="700" y="400" width="380" height="18" rx="6" fill="#5C6E58"/>
    <rect x="700" y="400" width="16" height="100" fill="#5C6E58"/>
    <rect x="1064" y="400" width="16" height="100" fill="#5C6E58"/>
    <line x1="720" y1="418" x2="1060" y2="418" stroke="#5C6E58" stroke-width="4"/>
    <line x1="720" y1="418" x2="730" y2="450" stroke="#5C6E58" stroke-width="4"/>
    <line x1="780" y1="418" x2="790" y2="450" stroke="#5C6E58" stroke-width="4"/>
    <line x1="840" y1="418" x2="850" y2="450" stroke="#5C6E58" stroke-width="4"/>
    <line x1="900" y1="418" x2="910" y2="450" stroke="#5C6E58" stroke-width="4"/>
    <line x1="960" y1="418" x2="970" y2="450" stroke="#5C6E58" stroke-width="4"/>
    <line x1="1020" y1="418" x2="1030" y2="450" stroke="#5C6E58" stroke-width="4"/>

    <!-- evenly spaced angled bowls -->
    <g transform="rotate(20 760 340)">
      <ellipse cx="760" cy="340" rx="50" ry="24" fill="#B85C38"/>
      <ellipse cx="760" cy="332" rx="38" ry="16" fill="#F6EFE6"/>
    </g>
    <g transform="rotate(-18 870 345)">
      <ellipse cx="870" cy="345" rx="50" ry="24" fill="#D9A441"/>
      <ellipse cx="870" cy="337" rx="38" ry="16" fill="#F6EFE6"/>
    </g>
    <g transform="rotate(15 985 340)">
      <ellipse cx="985" cy="340" rx="50" ry="24" fill="#5C6E58"/>
      <ellipse cx="985" cy="332" rx="38" ry="16" fill="#F6EFE6"/>
    </g>

    <!-- cups angled downward, spaced -->
    <g transform="rotate(35 780 260)">
      <path d="M765 230 L800 230 L796 280 L769 280 Z" fill="#B85C38"/>
      <ellipse cx="782" cy="230" rx="17" ry="6" fill="#E4C7B2"/>
    </g>
    <g transform="rotate(35 880 260)">
      <path d="M865 230 L900 230 L896 280 L869 280 Z" fill="#5C6E58"/>
      <ellipse cx="882" cy="230" rx="17" ry="6" fill="#E4C7B2"/>
    </g>
    <g transform="rotate(35 985 260)">
      <path d="M970 230 L1005 230 L1001 280 L974 280 Z" fill="#D9A441"/>
      <ellipse cx="987" cy="230" rx="17" ry="6" fill="#E4C7B2"/>
    </g>

    <!-- calm sparkle marks -->
    <g stroke="#D9A441" stroke-width="4" stroke-linecap="round">
      <line x1="1050" y1="140" x2="1050" y2="160"/>
      <line x1="1040" y1="150" x2="1060" y2="150"/>
    </g>
    <g stroke="#D9A441" stroke-width="4" stroke-linecap="round">
      <line x1="720" y1="150" x2="720" y2="166"/>
      <line x1="712" y1="158" x2="728" y2="158"/>
    </g>
  </g>

  <!-- Arrow indicating comparison -->
  <g>
    <path d="M560 315 L640 315" stroke="#2E2A24" stroke-width="4" fill="none"/>
    <path d="M625 302 L645 315 L625 328" stroke="#2E2A24" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>