<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- sky/ground split -->
  <rect x="0" y="0" width="1200" height="430" fill="#F6EFE6"/>
  <rect x="0" y="430" width="1200" height="200" fill="#E4C7B2" opacity="0.5"/>

  <!-- bare trees background -->
  <g opacity="0.85">
    <rect x="120" y="150" width="14" height="290" fill="#5C6E58"/>
    <path d="M127 160 L70 100 M127 190 L50 160 M127 210 L190 140 M127 240 L200 200 M127 170 L175 110" stroke="#5C6E58" stroke-width="6" stroke-linecap="round" fill="none"/>

    <rect x="1010" y="120" width="16" height="320" fill="#5C6E58"/>
    <path d="M1018 130 L950 70 M1018 165 L930 130 M1018 190 L1080 110 M1018 220 L1100 170 M1018 150 L1060 90" stroke="#5C6E58" stroke-width="7" stroke-linecap="round" fill="none"/>

    <rect x="880" y="180" width="10" height="240" fill="#5C6E58" opacity="0.7"/>
    <path d="M885 190 L850 150 M885 215 L840 200 M885 205 L920 160" stroke="#5C6E58" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>

    <rect x="260" y="200" width="9" height="220" fill="#5C6E58" opacity="0.6"/>
    <path d="M264 210 L235 175 M264 230 L295 190" stroke="#5C6E58" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- ground line -->
  <path d="M0 430 Q600 405 1200 430 L1200 630 L0 630 Z" fill="#E4C7B2"/>
  <path d="M0 430 Q600 405 1200 430" stroke="#D9A441" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- pile of leaves -->
  <g>
    <ellipse cx="620" cy="520" rx="160" ry="55" fill="#B85C38"/>
    <ellipse cx="560" cy="500" rx="60" ry="38" fill="#D9A441"/>
    <ellipse cx="680" cy="495" rx="70" ry="40" fill="#5C6E58"/>
    <ellipse cx="640" cy="530" rx="80" ry="35" fill="#E4C7B2" opacity="0.6"/>
    <ellipse cx="700" cy="525" rx="50" ry="30" fill="#B85C38" opacity="0.85"/>
    <ellipse cx="540" cy="530" rx="55" ry="32" fill="#D9A441" opacity="0.9"/>

    <!-- individual leaf shapes scattered on pile -->
    <path d="M600 480 q10 -20 25 -5 q-5 20 -25 5 Z" fill="#B85C38"/>
    <path d="M650 470 q12 -18 26 -3 q-8 18 -26 3 Z" fill="#5C6E58"/>
    <path d="M700 480 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#D9A441"/>
    <path d="M560 510 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#B85C38"/>
    <path d="M720 510 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#5C6E58"/>
  </g>

  <!-- scattered leaves on lawn -->
  <g>
    <path d="M180 470 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#D9A441"/>
    <path d="M230 500 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#B85C38"/>
    <path d="M950 470 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#5C6E58"/>
    <path d="M1010 500 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#D9A441"/>
    <path d="M880 560 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#B85C38"/>
    <path d="M320 570 q10 -16 22 -3 q-6 16 -22 3 Z" fill="#5C6E58"/>
  </g>

  <!-- rake leaning -->
  <g>
    <rect x="336" y="330" width="10" height="230" rx="4" fill="#D9A441" transform="rotate(12 340 330)"/>
    <g transform="rotate(12 340 330)">
      <rect x="300" y="310" width="90" height="14" rx="6" fill="#2E2A24"/>
      <rect x="304" y="322" width="4" height="26" fill="#2E2A24"/>
      <rect x="316" y="322" width="4" height="30" fill="#2E2A24"/>
      <rect x="328" y="322" width="4" height="32" fill="#2E2A24"/>
      <rect x="340" y="322" width="4" height="30" fill="#2E2A24"/>
      <rect x="352" y="322" width="4" height="26" fill="#2E2A24"/>
      <rect x="364" y="322" width="4" height="20" fill="#2E2A24"/>
    </g>
  </g>

  <!-- garden gloves -->
  <g transform="translate(880,480) rotate(-8)">
    <path d="M0 40 Q-6 -10 20 -14 Q30 -20 38 -12 Q46 -22 54 -12 Q62 -22 70 -12 Q78 -18 84 -8 Q94 -4 90 20 Q88 45 60 48 Q30 52 0 40 Z" fill="#5C6E58"/>
    <path d="M0 40 Q-6 -10 20 -14" fill="none" stroke="#2E2A24" stroke-width="2" opacity="0.3"/>
    <ellipse cx="42" cy="46" rx="46" ry="10" fill="#2E2A24" opacity="0.12"/>
  </g>
  <g transform="translate(965,505) rotate(15)">
    <path d="M0 40 Q-6 -10 20 -14 Q30 -20 38 -12 Q46 -22 54 -12 Q62 -22 70 -12 Q78 -18 84 -8 Q94 -4 90 20 Q88 45 60 48 Q30 52 0 40 Z" fill="#5C6E58" opacity="0.9"/>
    <ellipse cx="42" cy="46" rx="46" ry="10" fill="#2E2A24" opacity="0.1"/>
  </g>

  <!-- coiled garden hose -->
  <g transform="translate(210,545)">
    <circle cx="0" cy="0" r="70" fill="#B85C38"/>
    <circle cx="0" cy="0" r="55" fill="#E4C7B2"/>
    <circle cx="0" cy="0" r="42" fill="#B85C38"/>
    <circle cx="0" cy="0" r="28" fill="#E4C7B2"/>
    <circle cx="0" cy="0" r="14" fill="#B85C38"/>
    <path d="M70 -10 Q140 -30 150 20 Q156 55 120 55" stroke="#B85C38" stroke-width="16" fill="none" stroke-linecap="round"/>
    <circle cx="120" cy="55" r="12" fill="#D9A441"/>
    <rect x="112" y="45" width="18" height="20" rx="3" fill="#2E2A24" opacity="0.5"/>
  </g>

  <!-- small foreground grass tufts -->
  <g stroke="#5C6E58" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <path d="M60 600 q5 -20 0 -35"/>
    <path d="M75 600 q0 -25 8 -38"/>
    <path d="M1120 610 q5 -20 0 -35"/>
    <path d="M1140 610 q-3 -22 4 -34"/>
    <path d="M420 610 q4 -18 0 -30"/>
    <path d="M760 615 q4 -18 -2 -30"/>
  </g>
</svg>