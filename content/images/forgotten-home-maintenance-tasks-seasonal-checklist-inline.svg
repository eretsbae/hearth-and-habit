<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- Attic corner shapes -->
  <polygon points="0,0 1200,0 1200,120 600,320 0,120" fill="#E4C7B2" opacity="0.5"/>
  <polygon points="0,0 600,0 600,320 0,120" fill="#E4C7B2" opacity="0.4"/>

  <!-- Roof rafters -->
  <rect x="120" y="0" width="26" height="260" fill="#5C6E58" opacity="0.35" transform="rotate(18 133 130)"/>
  <rect x="340" y="0" width="26" height="260" fill="#5C6E58" opacity="0.35" transform="rotate(10 353 130)"/>
  <rect x="860" y="0" width="26" height="260" fill="#5C6E58" opacity="0.3" transform="rotate(-14 873 130)"/>
  <rect x="1040" y="0" width="26" height="260" fill="#5C6E58" opacity="0.3" transform="rotate(-8 1053 130)"/>

  <!-- Floor -->
  <rect x="0" y="470" width="1200" height="160" fill="#E4C7B2" opacity="0.55"/>
  <rect x="0" y="470" width="1200" height="10" fill="#5C6E58" opacity="0.4"/>

  <!-- Corner cobweb -->
  <path d="M980 40 Q1040 10 1100 40" stroke="#2E2A24" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M990 60 Q1040 30 1090 60" stroke="#2E2A24" stroke-width="2" fill="none" opacity="0.3"/>
  <line x1="1000" y1="20" x2="1010" y2="70" stroke="#2E2A24" stroke-width="1.5" opacity="0.3"/>
  <line x1="1040" y1="10" x2="1040" y2="70" stroke="#2E2A24" stroke-width="1.5" opacity="0.3"/>
  <line x1="1080" y1="20" x2="1070" y2="70" stroke="#2E2A24" stroke-width="1.5" opacity="0.3"/>

  <!-- Small box/crate in corner -->
  <rect x="900" y="430" width="120" height="90" fill="#B85C38"/>
  <rect x="900" y="430" width="120" height="18" fill="#9c4c2e"/>
  <line x1="960" y1="430" x2="960" y2="520" stroke="#8a4327" stroke-width="4"/>

  <!-- Flashlight beam (cone) -->
  <polygon points="430,300 900,150 900,430" fill="#D9A441" opacity="0.28"/>
  <polygon points="430,300 900,220 900,360" fill="#D9A441" opacity="0.3"/>

  <!-- Inspected area highlight circle -->
  <ellipse cx="820" cy="290" rx="90" ry="60" fill="#D9A441" opacity="0.35"/>

  <!-- Arm entering from bottom left -->
  <path d="M180 630 L180 480 Q180 440 230 430 L360 400 Q400 392 415 415 L430 445 Q440 465 415 478 L300 505 Q260 515 260 555 L260 630 Z" fill="#E4C7B2"/>
  <!-- Sleeve cuff -->
  <path d="M180 480 L180 630 L260 630 L260 555 Q260 515 300 505 L340 495 Q320 470 280 470 L220 475 Q195 476 180 480 Z" fill="#5C6E58"/>

  <!-- Hand holding flashlight -->
  <ellipse cx="410" cy="430" rx="42" ry="30" fill="#E4C7B2"/>
  <ellipse cx="400" cy="415" rx="14" ry="20" fill="#E4C7B2" transform="rotate(-20 400 415)"/>
  <ellipse cx="425" cy="405" rx="13" ry="19" fill="#E4C7B2" transform="rotate(-10 425 405)"/>
  <ellipse cx="440" cy="415" rx="12" ry="18" fill="#E4C7B2" transform="rotate(5 440 415)"/>
  <ellipse cx="440" cy="435" rx="12" ry="17" fill="#E4C7B2" transform="rotate(20 440 435)"/>

  <!-- Flashlight body -->
  <rect x="430" y="390" width="150" height="46" rx="10" fill="#2E2A24" transform="rotate(-20 430 390)"/>
  <rect x="560" y="345" width="55" height="46" rx="6" fill="#B85C38" transform="rotate(-20 560 345)"/>
  <ellipse cx="608" cy="335" rx="20" ry="24" fill="#D9A441" transform="rotate(-20 608 335)"/>

  <!-- small dust particles -->
  <circle cx="700" cy="260" r="3" fill="#D9A441" opacity="0.6"/>
  <circle cx="740" cy="300" r="2.5" fill="#D9A441" opacity="0.5"/>
  <circle cx="670" cy="330" r="2" fill="#D9A441" opacity="0.5"/>
  <circle cx="790" cy="230" r="2.5" fill="#D9A441" opacity="0.5"/>

  <!-- Insulation roll shape bottom right -->
  <rect x="1050" y="500" width="130" height="60" rx="30" fill="#5C6E58" opacity="0.5"/>
  <rect x="1050" y="500" width="130" height="60" rx="30" fill="none" stroke="#2E2A24" stroke-width="2" opacity="0.2"/>

  <!-- subtle vignette corners -->
  <rect x="0" y="0" width="1200" height="630" fill="none"/>
</svg>