  <rect x="630" y="440" width="70" height="18" rx="9" fill="#F6EFE6" opacity="0.85"/>
  <rect x="610" y="524" width="234" height="16" fill="#2E2A24" opacity="0.15"/>
  <!-- fruit peeking from drawer -->
  <circle cx="660" cy="432" r="10" fill="#5C6E58"/>
  <circle cx="690" cy="430" r="9" fill="#D9A441"/>
  <circle cx="720" cy="432" r="10" fill="#F6EFE6"/>
  <ellipse cx="770" cy="434" rx="14" ry="9" fill="#5C6E58"/>

