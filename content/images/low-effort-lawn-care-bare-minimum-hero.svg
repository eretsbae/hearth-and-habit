<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- sky/background band -->
  <rect x="0" y="0" width="1200" height="330" fill="#F6EFE6"/>

  <!-- lawn -->
  <rect x="0" y="330" width="1200" height="300" fill="#5C6E58"/>
  <rect x="0" y="330" width="1200" height="18" fill="#7C8A72"/>

  <!-- imperfect grass texture strokes -->
  <g stroke="#4C5C49" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="80" y1="380" x2="80" y2="360"/>
    <line x1="150" y1="420" x2="150" y2="400"/>
    <line x1="240" y1="390" x2="240" y2="370"/>
    <line x1="330" y1="460" x2="330" y2="440"/>
    <line x1="420" y1="410" x2="420" y2="390"/>
    <line x1="530" y1="470" x2="530" y2="450"/>
    <line x1="640" y1="400" x2="640" y2="380"/>
    <line x1="760" y1="440" x2="760" y2="420"/>
    <line x1="850" y1="380" x2="850" y2="360"/>
    <line x1="950" y1="450" x2="950" y2="430"/>
    <line x1="1040" y1="400" x2="1040" y2="380"/>
    <line x1="1120" y1="470" x2="1120" y2="450"/>
  </g>

  <!-- a few small clover-ish dots for "not manicured" feel -->
  <g fill="#D9A441" opacity="0.85">
    <circle cx="200" cy="480" r="5"/>
    <circle cx="980" cy="520" r="5"/>
    <circle cx="700" cy="560" r="5"/>
  </g>

  <!-- garden hose coiled, left side -->
  <g transform="translate(190,480)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#B85C38" stroke-width="16"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#B85C38" stroke-width="16"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#B85C38" stroke-width="14"/>
    <!-- hose tail extending out -->
    <path d="M 60 40 Q 140 60 190 20 Q 230 -10 210 -50"
          fill="none" stroke="#B85C38" stroke-width="16" stroke-linecap="round"/>
    <!-- nozzle -->
    <rect x="195" y="-70" width="18" height="34" rx="6" fill="#2E2A24"/>
  </g>

  <!-- work gloves, right of hose -->
  <g transform="translate(430,560)">
    <!-- left glove -->
    <g transform="rotate(-12)">
      <path d="M0,20 Q-4,-10 10,-14 L10,-40 Q10,-48 17,-48 Q24,-48 24,-40 L24,-16
               L28,-44 Q28,-52 35,-52 Q42,-52 42,-44 L42,-14
               L46,-42 Q46,-50 53,-50 Q60,-50 60,-42 L60,-12
               L64,-36 Q64,-44 71,-44 Q78,-44 78,-36 L78,-6
               Q92,-4 92,14 Q92,34 70,36 L20,36 Q0,34 0,20 Z"
            fill="#D9A441"/>
      <path d="M0,20 Q-4,-10 10,-14 L10,-40 Q10,-48 17,-48 Q24,-48 24,-40 L24,-16
               L28,-44 Q28,-52 35,-52 Q42,-52 42,-44 L42,-14"
            fill="none" stroke="#B85C38" stroke-width="3" opacity="0.5"/>
    </g>
    <!-- right glove -->
    <g transform="translate(95,10) rotate(10)">
      <path d="M0,20 Q-4,-10 10,-14 L10,-40 Q10,-48 17,-48 Q24,-48 24,-40 L24,-16
               L28,-44 Q28,-52 35,-52 Q42,-52 42,-44 L42,-14
               L46,-42 Q46,-50 53,-50 Q60,-50 60,-42 L60,-12
               L64,-36 Q64,-44 71,-44 Q78,-44 78,-36 L78,-6
               Q92,-4 92,14 Q92,34 70,36 L20,36 Q0,34 0,20 Z"
            fill="#D9A441"/>
    </g>
  </g>

  <!-- push mower, center-right, parked mid-yard -->
  <g transform="translate(760,430)">
    <!-- shadow -->
    <ellipse cx="0" cy="115" rx="130" ry="18" fill="#2E2A24" opacity="0.12"/>

    <!-- rear wheel -->
    <circle cx="-70" cy="95" r="34" fill="#2E2A24"/>
    <circle cx="-70" cy="95" r="14" fill="#E4C7B2"/>
    <!-- front wheel -->
    <circle cx="90" cy="100" r="26" fill="#2E2A24"/>
    <circle cx="90" cy="100" r="10" fill="#E4C7B2"/>

    <!-- body/deck -->
    <path d="M-110,60 Q-110,20 -60,20 L70,20 Q120,20 120,65 L120,90 Q120,100 108,100
             L-95,100 Q-110,100 -110,85 Z" fill="#B85C38"/>

    <!-- deck highlight -->
    <path d="M-100,35 Q-70,25 -20,25 L60,25" stroke="#E4C7B2" stroke-width="6"
          fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- grass chute -->
    <rect x="95" y="30" width="34" height="40" rx="8" fill="#D9A441"/>

    <!-- handle bars -->
    <path d="M-70,25 L-150,-95" stroke="#2E2A24" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M-40,25 L-120,-95" stroke="#2E2A24" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M-150,-95 L-115,-100" stroke="#2E2A24" stroke-width="10" stroke-linecap="round"/>
    <path d="M-120,-95 L-115,-100" stroke="#2E2A24" stroke-width="10" stroke-linecap="round"/>
    <!-- handle grip bar -->
    <rect x="-165" y="-108" width="60" height="14" rx="7" fill="#5C6E58"/>

    <!-- center bolt detail -->
    <circle cx="0" cy="60" r="8" fill="#D9A441"/>
  </g>

  <!-- simple potted plant far right for balance -->
  <g transform="translate(1090,470)">
    <path d="M-30,60 L-20,10 L20,10 L30,60 Z" fill="#E4C7B2"/>
    <ellipse cx="0" cy="10" rx="30" ry="8" fill="#D9A441" opacity="0.6"/>
    <path d="M0,10 Q-25,-30 -10,-60" stroke="#5C6E58" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M0,10 Q10,-40 30,-55" stroke="#5C6E58" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M0,10 Q0,-50 0,-70" stroke="#5C6E58" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- sun accent top left -->
  <circle cx="120" cy="100" r="60" fill="#D9A441" opacity="0.85"/>
  <circle cx="120" cy="100" r="60" fill="none" stroke="#E4C7B2" stroke-width="2" opacity="0.4"/>
</svg>