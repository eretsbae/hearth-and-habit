    <path d="M230 500 C240 410 225 330 245 260" stroke="#5C6E58" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M270 500 C260 400 280 320 265 245" stroke="#5C6E58" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
