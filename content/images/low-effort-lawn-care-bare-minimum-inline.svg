  <circle cx="220" cy="590" r="5" fill="#2E2A24" opacity="0.3"/>
  <circle cx="360" cy="540" r="7" fill="#B85C38" opacity="0.3"/>
  <circle cx="500" cy="600" r="5" fill="#2E2A24" opacity="0.25"/>
