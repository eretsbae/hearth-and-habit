  <!-- subtle arrows indicating one third cut -->
  <path d="M600 250 L640 250 L625 235 M640 250 L625 265" stroke="#2E2A24" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>