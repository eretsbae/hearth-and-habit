    <ellipse cx="718" cy="380" rx="7" ry="4" fill="#D9A441"/>
    <ellipse cx="762" cy="370" rx="9" ry="4" fill="#D9A441"/>
    <ellipse cx="790" cy="378" rx="7" ry="4" fill="#D9A441"/>
    <ellipse cx="845" cy="372" rx="8" ry="4" fill="#D9A441"/>
    <ellipse cx="870" cy="378" rx="7" ry="4" fill="#D9A441"/>
    <ellipse cx="925" cy="372" rx="9" ry="4" fill="#D9A441"/>
    <ellipse cx="950" cy="378" rx="7" ry="4" fill="#D9A441"/>
    <ellipse cx="1005" cy="372" rx="8" ry="4" fill="#D9A441"/>
    <ellipse cx="1030" cy="378" rx="7" ry="4" fill="#D9A441"/>
    <ellipse cx="1085" cy="372" rx="9" ry="4" fill="#D9A441"/>
