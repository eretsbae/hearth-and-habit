<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="630" fill="#F6EFE6"/>

  <!-- patio ground -->
  <rect x="0" y="380" width="1200" height="250" fill="#E4C7B2"/>

  <!-- patio tile lines -->
  <g stroke="#D9A441" stroke-width="2" opacity="0.35">
    <line x1="0" y1="430" x2="1200" y2="430"/>
    <line x1="0" y1="490" x2="1200" y2="490"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="610" x2="1200" y2="610"/>
    <line x1="150" y1="380" x2="80" y2="630"/>
    <line x1="350" y1="380" x2="300" y2="630"/>
    <line x1="550" y1="380" x2="520" y2="630"/>
    <line x1="750" y1="380" x2="740" y2="630"/>
    <line x1="950" y1="380" x2="960" y2="630"/>
    <line x1="1150" y1="380" x2="1170" y2="630"/>
  </g>

  <!-- back wall -->
  <rect x="0" y="0" width="1200" height="380" fill="#F6EFE6"/>
  <rect x="0" y="330" width="1200" height="50" fill="#5C6E58" opacity="0.15"/>

  <!-- distant potted plants -->
  <g>
    <rect x="90" y="300" width="60" height="70" rx="6" fill="#B85C38"/>
    <ellipse cx="120" cy="300" rx="45" ry="30" fill="#5C6E58"/>
    <ellipse cx="95" cy="285" rx="20" ry="14" fill="#5C6E58"/>
    <ellipse cx="150" cy="285" rx="20" ry="14" fill="#5C6E58"/>
  </g>
  <g>
    <rect x="1020" y="290" width="70" height="80" rx="6" fill="#5C6E58"/>
    <ellipse cx="1055" cy="290" rx="50" ry="32" fill="#B85C38"/>
    <ellipse cx="1025" cy="270" rx="22" ry="15" fill="#B85C38"/>
    <ellipse cx="1085" cy="270" rx="22" ry="15" fill="#B85C38"/>
  </g>

  <!-- puddles on patio (subtle highlight) -->
  <ellipse cx="620" cy="560" rx="120" ry="34" fill="#5C6E58" opacity="0.18"/>
  <ellipse cx="620" cy="556" rx="90" ry="22" fill="#D9A441" opacity="0.15"/>
  <ellipse cx="600" cy="550" rx="30" ry="8" fill="#F6EFE6" opacity="0.5"/>

  <ellipse cx="430" cy="600" rx="70" ry="18" fill="#5C6E58" opacity="0.16"/>
  <ellipse cx="440" cy="597" rx="20" ry="5" fill="#F6EFE6" opacity="0.45"/>

  <ellipse cx="800" cy="500" rx="45" ry="12" fill="#5C6E58" opacity="0.14"/>

  <!-- tipped over watering can -->
  <g transform="translate(560,470) rotate(-18)">
    <!-- body -->
    <ellipse cx="70" cy="30" rx="70" ry="34" fill="#B85C38"/>
    <rect x="0" y="0" width="140" height="34" rx="17" fill="#B85C38"/>
    <!-- lid -->
    <ellipse cx="18" cy="17" rx="16" ry="14" fill="#9C4A2C"/>
    <!-- handle -->
    <path d="M 40 -10 Q 70 -55 110 -10" stroke="#B85C38" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- spout -->
    <path d="M 140 15 L 205 -20 L 215 -12 L 150 30 Z" fill="#B85C38"/>
    <ellipse cx="212" cy="-16" rx="10" ry="7" fill="#9C4A2C"/>
    <!-- rose head -->
    <circle cx="205" cy="-22" r="12" fill="#D9A441"/>
  </g>

  <!-- water spilling from spout as small drops/stream -->
  <g fill="#5C6E58" opacity="0.35">
    <ellipse cx="760" cy="460" rx="10" ry="6"/>
    <ellipse cx="740" cy="480" rx="8" ry="5"/>
    <ellipse cx="715" cy="500" rx="7" ry="4"/>
  </g>
  <path d="M 700 500 Q 680 530 630 545 Q 590 555 560 555" stroke="#5C6E58" stroke-width="6" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- bucket -->
  <g transform="translate(880,420)">
    <path d="M 0 20 L 20 110 L 130 110 L 150 20 Z" fill="#5C6E58"/>
    <ellipse cx="75" cy="20" rx="75" ry="18" fill="#3F4D3C"/>
    <ellipse cx="75" cy="20" rx="60" ry="12" fill="#485C46"/>
    <!-- water inside bucket, subtle -->
    <ellipse cx="75" cy="22" rx="52" ry="9" fill="#F6EFE6" opacity="0.3"/>
    <!-- handle -->
    <path d="M 20 30 Q 75 -35 130 30" stroke="#3F4D3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- small stray leaves for texture -->
  <g fill="#5C6E58" opacity="0.5">
    <ellipse cx="250" cy="560" rx="14" ry="7" transform="rotate(20 250 560)"/>
    <ellipse cx="980" cy="580" rx="12" ry="6" transform="rotate(-15 980 580)"/>
    <ellipse cx="500" cy="490" rx="10" ry="5" transform="rotate(40 500 490)"/>
  </g>

  <!-- small grass tuft accents at base of wall -->
  <g stroke="#5C6E58" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="200" y1="380" x2="195" y2="360"/>
    <line x1="210" y1="380" x2="212" y2="358"/>
    <line x1="220" y1="380" x2="225" y2="362"/>
  </g>
  <g stroke="#5C6E58" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="960" y1="380" x2="955" y2="358"/>
    <line x1="970" y1="380" x2="973" y2="356"/>
    <line x1="980" y1="380" x2="985" y2="360"/>
  </g>
</svg>