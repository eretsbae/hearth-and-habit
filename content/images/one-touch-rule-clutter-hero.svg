<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- room background -->
  <rect x="0" y="0" width="1200" height="420" fill="#F6EFE6"/>
  <rect x="0" y="400" width="1200" height="230" fill="#E4C7B2" opacity="0.4"/>

  <!-- wall accent shapes -->
  <rect x="80" y="60" width="220" height="150" rx="8" fill="#E4C7B2" opacity="0.5"/>
  <circle cx="1000" cy="120" r="70" fill="#D9A441" opacity="0.25"/>
  <rect x="900" y="220" width="160" height="100" rx="10" fill="#5C6E58" opacity="0.15"/>

  <!-- small side table with plant -->
  <rect x="950" y="380" width="120" height="18" rx="6" fill="#B85C38"/>
  <rect x="990" y="398" width="16" height="90" fill="#B85C38"/>
  <ellipse cx="998" cy="488" rx="40" ry="10" fill="#5C6E58" opacity="0.3"/>
  <rect x="975" y="330" width="46" height="55" rx="6" fill="#D9A441"/>
  <path d="M998 330 C980 300 1010 290 998 260" stroke="#5C6E58" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M998 330 C1020 300 995 285 1010 255" stroke="#5C6E58" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Cabinet -->
  <rect x="620" y="200" width="360" height="380" rx="10" fill="#B85C38"/>
  <rect x="640" y="220" width="150" height="150" rx="6" fill="#8f4529"/>
  <rect x="810" y="220" width="150" height="150" rx="6" fill="#8f4529"/>
  <rect x="640" y="390" width="150" height="150" rx="6" fill="#8f4529"/>
  <rect x="810" y="390" width="150" height="150" rx="6" fill="#8f4529"/>

  <!-- open cabinet door (the one being reached into) -->
  <rect x="640" y="220" width="150" height="150" rx="6" fill="#a1522f"/>
  <rect x="620" y="200" width="30" height="180" rx="6" fill="#8f4529" transform="rotate(-18 620 200)"/>
  <circle cx="775" cy="295" r="6" fill="#D9A441"/>

  <!-- shelf inside cabinet with folded items -->
  <rect x="650" y="330" width="130" height="10" fill="#5C6E58" opacity="0.3"/>
  <rect x="660" y="300" width="45" height="28" rx="4" fill="#E4C7B2"/>
  <rect x="712" y="300" width="45" height="28" rx="4" fill="#D9A441" opacity="0.8"/>

  <!-- Arm reaching from left, holding mug, placing into cabinet -->
  <!-- forearm -->
  <path d="M320 470 C420 430 520 380 610 300" stroke="#E4C7B2" stroke-width="46" stroke-linecap="round" fill="none"/>
  <!-- sleeve -->
  <path d="M300 500 C360 460 420 440 470 415" stroke="#5C6E58" stroke-width="60" stroke-linecap="round" fill="none"/>

  <!-- hand -->
  <g transform="translate(610,300)">
    <ellipse cx="0" cy="0" rx="34" ry="26" fill="#E4C7B2"/>
    <ellipse cx="-14" cy="-18" rx="10" ry="18" fill="#E4C7B2" transform="rotate(-20 -14 -18)"/>
    <ellipse cx="8" cy="-24" rx="9" ry="17" fill="#E4C7B2" transform="rotate(-5 8 -24)"/>
    <ellipse cx="24" cy="-18" rx="9" ry="16" fill="#E4C7B2" transform="rotate(15 24 -18)"/>
    <ellipse cx="32" cy="0" rx="8" ry="14" fill="#E4C7B2" transform="rotate(35 32 0)"/>
  </g>

  <!-- mug being placed -->
  <g transform="translate(660,278)">
    <rect x="-22" y="-10" width="44" height="38" rx="6" fill="#D9A441"/>
    <path d="M22 0 C40 0 40 22 22 22" stroke="#D9A441" stroke-width="8" fill="none"/>
    <rect x="-22" y="-14" width="44" height="8" rx="4" fill="#c8912f"/>
  </g>

  <!-- floor rug -->
  <ellipse cx="450" cy="590" rx="260" ry="30" fill="#5C6E58" opacity="0.2"/>

  <!-- small stool -->
  <rect x="150" y="500" width="120" height="18" rx="6" fill="#5C6E58"/>
  <rect x="165" y="518" width="14" height="60" fill="#5C6E58"/>
  <rect x="240" y="518" width="14" height="60" fill="#5C6E58"/>

  <!-- decorative wall art -->
  <rect x="120" y="90" width="140" height="100" rx="8" fill="#F6EFE6" stroke="#B85C38" stroke-width="6"/>
  <circle cx="190" cy="140" r="26" fill="#B85C38" opacity="0.6"/>

</svg>