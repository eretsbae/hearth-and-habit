<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- divider -->
  <rect x="595" y="60" width="10" height="510" fill="#E4C7B2"/>

  <!-- ===== LEFT: CLUTTERED SIDE ===== -->
  <g>
    <!-- wall accent -->
    <rect x="60" y="60" width="480" height="330" fill="#E4C7B2" opacity="0.3"/>

    <!-- table -->
    <rect x="90" y="390" width="440" height="22" fill="#5C6E58"/>
    <rect x="115" y="412" width="18" height="150" fill="#5C6E58"/>
    <rect x="475" y="412" width="18" height="150" fill="#5C6E58"/>

    <!-- pile of mail, skewed -->
    <rect x="150" y="330" width="120" height="70" fill="#F6EFE6" stroke="#2E2A24" stroke-width="3" transform="rotate(-8 150 330)"/>
    <rect x="170" y="315" width="110" height="65" fill="#D9A441" opacity="0.85" transform="rotate(5 170 315)"/>
    <rect x="160" y="300" width="100" height="60" fill="#B85C38" opacity="0.8" transform="rotate(-4 160 300)"/>

    <!-- keys -->
    <circle cx="330" cy="360" r="14" fill="none" stroke="#2E2A24" stroke-width="5"/>
    <rect x="342" y="355" width="30" height="8" fill="#2E2A24"/>
    <rect x="365" y="358" width="8" height="14" fill="#2E2A24"/>
    <rect x="325" y="345" width="40" height="6" fill="#2E2A24" transform="rotate(20 325 345)"/>

    <!-- shoes toppled -->
    <path d="M370 400 Q400 370 440 385 Q460 395 450 410 Q420 420 380 415 Q365 410 370 400 Z" fill="#B85C38"/>
    <path d="M410 405 Q440 380 480 392 Q500 402 488 415 Q460 425 420 420 Q405 415 410 405 Z" fill="#5C6E58" transform="rotate(10 440 400)"/>

    <!-- bag slouched -->
    <path d="M120 340 Q110 400 140 405 Q190 410 195 360 Q190 335 160 335 Q130 335 120 340 Z" fill="#D9A441" opacity="0.9"/>
    <path d="M140 335 Q150 315 165 335" fill="none" stroke="#2E2A24" stroke-width="4"/>

    <!-- scattered coins/objects -->
    <circle cx="270" cy="405" r="8" fill="#D9A441"/>
    <circle cx="290" cy="410" r="6" fill="#B85C38"/>
    <ellipse cx="500" cy="405" rx="14" ry="6" fill="#2E2A24" opacity="0.6"/>
  </g>

  <!-- ===== RIGHT: TIDY SIDE ===== -->
  <g>
    <!-- wall accent -->
    <rect x="660" y="60" width="480" height="330" fill="#5C6E58" opacity="0.15"/>

    <!-- table -->
    <rect x="690" y="390" width="440" height="22" fill="#5C6E58"/>
    <rect x="715" y="412" width="18" height="150" fill="#5C6E58"/>
    <rect x="1075" y="412" width="18" height="150" fill="#5C6E58"/>

    <!-- neat tray -->
    <rect x="740" y="370" width="150" height="16" rx="4" fill="#D9A441"/>
    <rect x="748" y="358" width="60" height="16" fill="#F6EFE6" stroke="#2E2A24" stroke-width="2"/>

    <!-- keys hung neatly on small hook -->
    <rect x="930" y="300" width="6" height="20" fill="#2E2A24"/>
    <circle cx="933" cy="325" r="4" fill="#2E2A24"/>
    <circle cx="945" cy="340" r="10" fill="none" stroke="#2E2A24" stroke-width="4"/>
    <rect x="953" y="337" width="20" height="6" fill="#2E2A24"/>

    <!-- single tidy shoe pair aligned -->
    <path d="M950 395 Q970 380 1000 388 Q1015 393 1008 402 Q985 408 958 405 Q948 402 950 395 Z" fill="#B85C38"/>
    <path d="M985 395 Q1005 380 1035 388 Q1050 393 1043 402 Q1020 408 993 405 Q983 402 985 395 Z" fill="#B85C38"/>

    <!-- bag hung, tidy shape -->
    <path d="M760 300 Q755 340 780 345 Q815 348 818 315 Q815 298 795 298 Q770 298 760 300 Z" fill="#D9A441" opacity="0.9"/>
    <path d="M775 298 Q785 280 800 298" fill="none" stroke="#2E2A24" stroke-width="4"/>

    <!-- small plant for calm -->
    <rect x="1030" y="350" width="30" height="30" fill="#E4C7B2"/>
    <path d="M1045 350 Q1030 320 1045 300" fill="none" stroke="#5C6E58" stroke-width="5"/>
    <path d="M1045 350 Q1060 325 1050 305" fill="none" stroke="#5C6E58" stroke-width="5"/>
    <path d="M1045 350 Q1045 315 1045 295" fill="none" stroke="#5C6E58" stroke-width="5"/>

    <!-- neatly stacked mail -->
    <rect x="838" y="378" width="70" height="8" fill="#F6EFE6" stroke="#2E2A24" stroke-width="2"/>
  </g>

  <!-- subtle arrow motif between sides -->
  <g opacity="0.5">
    <circle cx="600" cy="150" r="26" fill="#B85C38" opacity="0.15"/>
    <path d="M588 150 L612 150 M604 138 L616 150 L604 162" fill="none" stroke="#B85C38" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>