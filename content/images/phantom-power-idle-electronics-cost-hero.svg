<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6EFE6"/>

  <!-- back wall -->
  <rect x="0" y="0" width="1200" height="440" fill="#E4C7B2" opacity="0.35"/>
  <!-- floor -->
  <rect x="0" y="440" width="1200" height="190" fill="#5C6E58" opacity="0.25"/>

  <!-- window with night sky -->
  <rect x="80" y="70" width="220" height="290" rx="6" fill="#2E2A24" opacity="0.85"/>
  <rect x="95" y="85" width="190" height="120" fill="#5C6E58" opacity="0.55"/>
  <rect x="95" y="215" width="190" height="130" fill="#5C6E58" opacity="0.4"/>
  <circle cx="230" cy="130" r="18" fill="#D9A441" opacity="0.8"/>
  <circle cx="150" cy="270" r="3" fill="#F6EFE6" opacity="0.7"/>
  <circle cx="200" cy="300" r="2" fill="#F6EFE6" opacity="0.5"/>
  <circle cx="255" cy="250" r="2" fill="#F6EFE6" opacity="0.6"/>
  <rect x="80" y="70" width="220" height="290" rx="6" fill="none" stroke="#2E2A24" stroke-width="6"/>
  <line x1="190" y1="70" x2="190" y2="360" stroke="#2E2A24" stroke-width="4"/>
  <line x1="80" y1="215" x2="300" y2="215" stroke="#2E2A24" stroke-width="4"/>

  <!-- rug -->
  <ellipse cx="650" cy="565" rx="330" ry="50" fill="#B85C38" opacity="0.25"/>

  <!-- sofa -->
  <rect x="470" y="400" width="330" height="110" rx="18" fill="#B85C38"/>
  <rect x="470" y="370" width="330" height="60" rx="20" fill="#B85C38"/>
  <rect x="455" y="395" width="40" height="110" rx="14" fill="#B85C38"/>
  <rect x="785" y="395" width="40" height="110" rx="14" fill="#B85C38"/>
  <circle cx="560" cy="410" r="26" fill="#E4C7B2"/>
  <circle cx="650" cy="410" r="26" fill="#D9A441" opacity="0.85"/>
  <circle cx="740" cy="410" r="26" fill="#E4C7B2"/>

  <!-- side table with lamp -->
  <rect x="870" y="470" width="90" height="14" rx="4" fill="#2E2A24"/>
  <rect x="895" y="484" width="10" height="60" fill="#2E2A24"/>
  <rect x="870" y="544" width="90" height="8" rx="3" fill="#2E2A24"/>

  <!-- TV stand -->
  <rect x="920" y="330" width="240" height="18" rx="4" fill="#2E2A24"/>
  <rect x="940" y="348" width="200" height="70" rx="6" fill="#5C6E58"/>

  <!-- TV -->
  <rect x="945" y="210" width="210" height="120" rx="8" fill="#2E2A24"/>
  <rect x="960" y="222" width="180" height="96" rx="4" fill="#2E2A24"/>
  <rect x="960" y="222" width="180" height="96" rx="4" fill="#5C6E58" opacity="0.15"/>
  <rect x="1030" y="330" width="40" height="18" fill="#2E2A24"/>
  <!-- TV standby light -->
  <circle cx="1140" cy="322" r="3.5" fill="#D9A441"/>
  <circle cx="1140" cy="322" r="8" fill="#D9A441" opacity="0.3"/>

  <!-- game console on stand -->
  <rect x="960" y="360" width="70" height="18" rx="4" fill="#2E2A24"/>
  <circle cx="1020" cy="369" r="3" fill="#B85C38"/>
  <circle cx="1020" cy="369" r="7" fill="#B85C38" opacity="0.3"/>

  <!-- router on shelf -->
  <rect x="1055" y="365" width="60" height="12" rx="3" fill="#2E2A24"/>
  <circle cx="1065" cy="371" r="2.2" fill="#5C6E58"/>
  <circle cx="1075" cy="371" r="2.2" fill="#D9A441"/>
  <circle cx="1075" cy="371" r="6" fill="#D9A441" opacity="0.35"/>
  <circle cx="1085" cy="371" r="2.2" fill="#5C6E58"/>

  <!-- outlet on wall near floor -->
  <rect x="360" y="500" width="34" height="46" rx="4" fill="#E4C7B2"/>
  <rect x="368" y="510" width="6" height="10" rx="2" fill="#2E2A24"/>
  <rect x="380" y="510" width="6" height="10" rx="2" fill="#2E2A24"/>
  <rect x="373" y="526" width="8" height="6" rx="2" fill="#2E2A24"/>

  <!-- dollar signs drifting from outlet -->
  <g fill="#D9A441" opacity="0.85">
    <path d="M377 480 q6 0 6 6 q0 5 -6 6 q-6 1 -6 6 q0 6 6 6" stroke="#D9A441" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="377" y1="474" x2="377" y2="506" stroke="#D9A441" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g fill="#D9A441" opacity="0.55">
    <path d="M350 440 q5 0 5 5 q0 4 -5 5 q-5 1 -5 5 q0 5 5 5" stroke="#D9A441" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="350" y1="435" x2="350" y2="462" stroke="#D9A441" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g fill="#D9A441" opacity="0.35">
    <path d="M400 405 q4 0 4 4 q0 3 -4 4 q-4 1 -4 4 q0 4 4 4" stroke="#D9A441" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="400" y1="401" x2="400" y2="423" stroke="#D9A441" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- second outlet near TV stand with dollar drift -->
  <rect x="1000" y="440" width="30" height="42" rx="4" fill="#E4C7B2"/>
  <rect x="1007" y="449" width="5" height="9" rx="2" fill="#2E2A24"/>
  <rect x="1018" y="449" width="5" height="9" rx="2" fill="#2E2A24"/>
  <rect x="1011" y="463" width="7" height="5" rx="2" fill="#2E2A24"/>

  <g opacity="0.7">
    <path d="M1015 420 q5 0 5 5 q0 4 -5 5 q-5 1 -5 5 q0 5 5 5" stroke="#D9A441" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="1015" y1="415" x2="1015" y2="442" stroke="#D9A441" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.4">
    <path d="M1035 385 q4 0 4 4 q0 3 -4 4 q-4 1 -4 4 q0 4 4 4" stroke="#D9A441" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="1035" y1="381" x2="1035" y2="403" stroke="#D9A441" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- small plant -->
  <rect x="130" y="500" width="60" height="50" rx="8" fill="#B85C38"/>
  <path d="M160 500 q-30 -30 -45 -60 q35 5 50 35 q10 -35 45 -45 q-5 40 -35 60 q20 -5 35 10 q-25 15 -50 0z" fill="#5C6E58"/>

</svg>