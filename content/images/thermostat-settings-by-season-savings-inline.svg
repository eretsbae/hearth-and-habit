<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="630" fill="#F6EFE6"/>

  <!-- decorative corner circles -->
  <circle cx="1120" cy="90" r="60" fill="#E4C7B2" opacity="0.5"/>
  <circle cx="70" cy="560" r="80" fill="#5C6E58" opacity="0.15"/>

  <!-- card panel -->
  <rect x="110" y="120" width="980" height="400" rx="18" fill="#FFFFFF" opacity="0.35"/>

  <!-- grid baseline -->
  <line x1="170" y1="470" x2="1030" y2="470" stroke="#2E2A24" stroke-width="2" opacity="0.4"/>
  <line x1="170" y1="180" x2="170" y2="470" stroke="#2E2A24" stroke-width="2" opacity="0.4"/>

  <!-- horizontal guide lines -->
  <line x1="170" y1="260" x2="1030" y2="260" stroke="#2E2A24" stroke-width="1" opacity="0.12"/>
  <line x1="170" y1="340" x2="1030" y2="340" stroke="#2E2A24" stroke-width="1" opacity="0.12"/>
  <line x1="170" y1="400" x2="1030" y2="400" stroke="#2E2A24" stroke-width="1" opacity="0.12"/>

  <!-- steady temperature line (terracotta) -->
  <path d="M 170 250 L 1030 250" fill="none" stroke="#B85C38" stroke-width="7" stroke-linecap="round"/>
  <circle cx="1030" cy="250" r="10" fill="#B85C38"/>
  <circle cx="170" cy="250" r="10" fill="#B85C38"/>

  <!-- dipping and recovering line (sage) -->
  <path d="M 170 250
           C 260 250, 300 400, 380 400
           C 460 400, 480 260, 560 260
           C 640 260, 660 400, 740 400
           C 820 400, 840 260, 920 260
           C 970 260, 990 250, 1030 250"
        fill="none" stroke="#5C6E58" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- dots marking dips and recoveries -->
  <circle cx="380" cy="400" r="9" fill="#5C6E58"/>
  <circle cx="560" cy="260" r="9" fill="#5C6E58"/>
  <circle cx="740" cy="400" r="9" fill="#5C6E58"/>
  <circle cx="920" cy="260" r="9" fill="#5C6E58"/>

  <!-- savings shading between the two lines (subtle gold fill) -->
  <path d="M 170 250
           C 260 250, 300 400, 380 400
           C 460 400, 480 260, 560 260
           C 640 260, 660 400, 740 400
           C 820 400, 840 260, 920 260
           C 970 260, 990 250, 1030 250
           L 1030 250 L 170 250 Z"
        fill="#D9A441" opacity="0.18"/>

  <!-- small thermostat dial icon top right of chart -->
  <circle cx="930" cy="170" r="42" fill="#E4C7B2"/>
  <circle cx="930" cy="170" r="30" fill="#F6EFE6"/>
  <circle cx="930" cy="170" r="6" fill="#2E2A24"/>
  <rect x="927" y="140" width="6" height="20" rx="3" fill="#2E2A24" transform="rotate(35 930 170)"/>

  <!-- small sun/snowflake motif for seasons, left side -->
  <g transform="translate(230,175)">
    <circle cx="0" cy="0" r="20" fill="#D9A441" opacity="0.85"/>
    <line x1="0" y1="-32" x2="0" y2="-24" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="24" x2="0" y2="32" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="-32" y1="0" x2="-24" y2="0" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="0" x2="32" y2="0" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="-22" y1="-22" x2="-16" y2="-16" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="22" y2="22" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="-22" y1="22" x2="-16" y2="16" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="-16" x2="22" y2="-22" stroke="#D9A441" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- little house silhouette bottom, grounding the theme -->
  <g transform="translate(600,560)">
    <rect x="-50" y="0" width="100" height="45" fill="#5C6E58" opacity="0.5"/>
    <polygon points="-60,0 0,-45 60,0" fill="#B85C38" opacity="0.6"/>
    <rect x="-12" y="15" width="24" height="30" fill="#F6EFE6" opacity="0.8"/>
  </g>
</svg>